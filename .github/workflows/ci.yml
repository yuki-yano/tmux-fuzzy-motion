name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install tmux 3.5a
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison pkg-config libevent-dev libncurses-dev wget
          wget https://github.com/tmux/tmux/releases/download/3.5a/tmux-3.5a.tar.gz
          tar -xzf tmux-3.5a.tar.gz
          cd tmux-3.5a
          ./configure
          make -j"$(nproc)"
          sudo make install
          tmux -V

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build
